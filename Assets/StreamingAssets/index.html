<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>HBOX</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 0;
				padding: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				background-color: #090909;
			}
			
			form {
				height: 90vh;
				width: 90%;
				position: relative;
			}
			
			textarea {
				width: 100%; height: 90vh;
				padding: 10px;
				font-family: Arial, sans-serif;
				font-size: 1em;
				border: 2px solid #222222;
				border-radius: 5px;
				resize: none;
				box-sizing: border-box;
				color: #cccccc;
				background-color: #292929;
			}
			
			.inputbox {
				position: absolute; bottom: 10px; right: 10px;
				z-index: 1;
			}

			select {
				padding: 10px;
				font-size: 1em;
				color: white;
				background-color: #333333;
				border: 2px solid #111111;
				border-radius: 5px;
			}

			select:hover {
				background-color: #111111;
			}

			button {
				padding: 10px 20px;
				font-size: 1em;
				color: white;
				background-color: #333333;
				border: 2px solid #111111;
				border-radius: 5px;
				cursor: pointer;
			}
			
			button:hover {
				background-color: #111111;
			}

			#status {
				margin-top: 8px;
				color: #777777;
				font-size: 12px;
			}
		</style>
	</head>
	<body>
		<form id="form">
			<div class="inputbox">
				<button type="submit">Suggest</button>
				<select id="options"></select>
				<div id="status"></div>
			</div>
			<textarea id="input" placeholder="Write your idea here..."></textarea>
		</form>
		<script>
			const form = document.getElementById('form');
			const input = document.getElementById('input');
			const options = document.getElementById('options');

			function groupByContext(items) {
				const map = new Map();
				for (const it of items) {
					const key = (it.context || 'other').toString();
					if (!map.has(key)) map.set(key, []);
					map.get(key).push(it);
				}
				return map;
			}

			function populateSelect(items) {
				options.innerHTML = '';

				const groups = groupByContext(items);
				const contexts = Array.from(groups.keys()).sort((a,b) => a.localeCompare(b));

				for (const ctx of contexts) {
					const og = document.createElement('optgroup');
					og.label = ctx;

					const gens = groups.get(ctx)
						.slice()
						.sort((a,b) => (a.name || '').localeCompare(b.name || ''));

					for (const g of gens) {
						if (!g.href) continue;

						const opt = document.createElement('option');
						opt.value = g.href;
						opt.textContent = g.name || g.href;
						og.appendChild(opt);
					}

					options.appendChild(og);
				}
			}

			async function loadGenerators() {
				const res = await fetch('/generate', {
					method: 'GET',
					headers: { 'Accept': 'application/json' },
					cache: 'no-store'
				});

				if (!res.ok)
					throw new Error(`HTTP ${res.status}`);

				const data = await res.json();
				if (!Array.isArray(data))
					throw new Error('Expected array');

				populateSelect(data);
			}

			loadGenerators().catch(err => console.warn('Failed to load generators:', err));

			form.addEventListener('submit', async (e) => {
				e.preventDefault();

				const url = options.value;
				const content = input.value;

				if (!url) return;

				const res = await fetch(url, {
					method: 'POST',
					headers: { 'Content-Type': 'text/plain; charset=utf-8' },
					body: content
				});

				if (res.ok) input.value = '';
			});
		</script>
	</body>
</html>
